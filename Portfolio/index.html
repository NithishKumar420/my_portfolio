<!DOCTYPE html>
<html>
<head>
    <title>Welcome</title>

    <style>
        body {
            justify-content: center;
            align-items: center;
            text-align: center;
            font-family: Arial;
            transition: opacity 1s;
        }
        .hidden {
            opacity: 0;
        }
    </style>
</head>
<body id="welcome">

    <h1>Welcome to Our Website</h1>
    <p>Loading... Please wait</p>

    <script>
        setTimeout(() => {
            document.getElementById("welcome").classList.add("hidden");
            
            // Redirect after fade
            setTimeout(() => {
                window.location.href = "home.html";
            }, 1000);

        }, 3000);
    </script>

</body>
</html>
